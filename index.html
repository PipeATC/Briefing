<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIEFING - Panel de Configuración Operativa Local</title>
    <style>
        :root {
            --bg-base: #070c14;
            --bg-panel: #0f1726;
            --bg-card: #172237;
            --bg-input: #1e2d4a;
            --accent-cyan: #00f0ff;
            --accent-blue: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --success: #00ff66;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(0, 240, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* SCREEN DE AUTENTICACIÓN (LOGIN) */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-base); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background-color: var(--bg-panel); padding: 40px; border-radius: 6px;
            border: 1px solid var(--border); width: 420px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .login-card h1 { color: var(--accent-cyan); font-size: 1.8rem; margin-bottom: 8px; letter-spacing: 2px; }
        .login-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; font-weight: bold;}
        .input-group input, .input-group select {
            width: 100%; padding: 12px; background-color: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: white;
            font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--accent-cyan); }
        .login-btn {
            width: 100%; padding: 14px; background-color: var(--accent-blue); color: white;
            border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; transition: all 0.2s;
        }
        .login-btn:hover { background-color: var(--accent-cyan); color: var(--bg-base); }
        .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; display: none; font-family: monospace; }

        /* INTERFAZ OPERATIVA PRINCIPAL */
        #app-layout { display: none; width: 100%; height: 100%; }

        /* SIDEBAR DE CONTROL DEL ESPACIO AÉREO */
        aside {
            width: 320px; background-color: var(--bg-panel);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { color: var(--accent-cyan); font-size: 1.3rem; letter-spacing: 1px; }
        .sidebar-header span { font-size: 0.8rem; color: var(--text-muted); display: block; margin-top: 4px; }
        
        .search-container { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .search-container input {
            width: 100%; padding: 10px; background-color: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; color: white; font-size: 0.9rem;
        }

        .airport-list { flex: 1; overflow-y: auto; padding: 10px; }
        .airport-item {
            padding: 12px 15px; margin-bottom: 6px; border-radius: 4px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-muted); border: 1px solid transparent; transition: all 0.15s;
        }
        .airport-item:hover { background-color: rgba(255,255,255,0.02); color: var(--text-main); }
        .airport-item.active {
            background-color: var(--bg-card); color: var(--accent-cyan);
            border-color: var(--border); border-left: 4px solid var(--accent-cyan);
        }
        .airport-item .icao-code { font-family: monospace; font-size: 1.1rem; font-weight: bold; }
        .airport-item .ap-name { font-size: 0.8rem; color: var(--text-muted); text-align: right; }
        .airport-item.active .ap-name { color: var(--text-main); }

        /* SECCIÓN DE VISUALIZACIÓN CENTRAL */
        main { flex: 1; display: flex; flex-direction: column; }
        header {
            padding: 15px 30px; background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 1.3rem; font-weight: 400; color: var(--text-main); }
        header h1 span { color: var(--accent-cyan); font-weight: bold; }
        .clock { font-family: monospace; font-size: 1.4rem; color: var(--accent-cyan); font-weight: bold; }

        .dashboard-grid {
            flex: 1; padding: 20px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(520px, 1fr)); gap: 20px;
            align-content: start;
        }

        /* CONFIGURACIÓN DE LAS TARJETAS SELECTORAS */
        .card {
            background-color: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 5px; display: flex; flex-direction: column; overflow: hidden;
        }
        .card-header {
            padding: 12px 18px; background-color: rgba(0, 240, 255, 0.02);
            border-bottom: 1px solid rgba(0, 240, 255, 0.08);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .header-title-container { display: flex; align-items: center; gap: 12px; }
        .card-header h3 { font-size: 1.15rem; font-family: monospace; color: var(--accent-cyan); }
        .card-header .city-label { font-size: 0.8rem; color: var(--text-muted); }

        /* Estilos de las Categorías de Vuelo (VMC, MVFR, IFR, LIFR) */
        .flight-category {
            font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 4px;
            font-family: monospace; letter-spacing: 1px; display: inline-block;
        }
        .cat-VMC { background-color: rgba(0, 255, 102, 0.15); color: var(--success); border: 1px solid var(--success); }
        .cat-MVFR { background-color: rgba(59, 130, 246, 0.15); color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        .cat-IFR { background-color: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .cat-LIFR { background-color: rgba(217, 70, 239, 0.15); color: #d946ef; border: 1px solid #d946ef; }

        .card-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
        
        /* Selectores Operativos */
        .selectors-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .selector-box { background-color: var(--bg-card); padding: 10px; border-radius: 4px; }
        .selector-box label { display: block; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; font-weight: bold;}
        .selector-box select {
            width: 100%; padding: 8px; background-color: var(--bg-input);
            color: var(--text-main); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px;
            font-size: 0.85rem; font-weight: bold; outline: none; cursor: pointer; color: var(--accent-cyan);
        }
        .selector-box select:focus { border-color: var(--accent-cyan); }

        /* Información Técnica e Info de IFIS */
        .ifis-block {
            background-color: rgba(0,0,0,0.2); border-left: 3px solid var(--success);
            padding: 10px; font-family: monospace; font-size: 0.85rem; line-height: 1.4;
        }
        .ifis-block.taf-block { border-left-color: var(--warning); }
        .ifis-block.notam-block { border-left-color: var(--danger); font-size: 0.8rem; color: #cbd5e1; max-height: 100px; overflow-y: auto;}
        .block-title { font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 3px; font-weight: bold; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="login-overlay">

            <h1>SISTEMA BRIEFING</h1>
            <p>Consola de Gestión Operativa Estática - Centros de Control / APP</p>
            
            <div class="input-group">
                <label>Unidad ATS de Servicio</label>

    <script>

            'SCIP': { nombre: 'Mataveri', ciudad: 'Isla de Pascua', rwys: ['10', '28'], apps: ['VOR DME RWY 10', 'RNP RWY 10', 'RNP RWY 28'], stars: ['MATAVERI 1A', 'HANGA 1B'], metar: 'SCIP 011600Z 09014KT 9999 SCT022 24/19 Q1020', taf: 'TAF SCIP 011200Z 0112/0212 10015KT 9999 SCT025 BKN080', notam: 'A0045/26 - FRECUENCIA PRINCIPAL VHF 124.3 MHZ CON COBERTURA REDUCIDA HACIA EL SE.' },
            'SCIE': { nombre: 'Carriel Sur', ciudad: 'Concepción', rwys: ['02', '20'], apps: ['ILS Z RWY 02', 'RNP RWY 02', 'RNP RWY 20', 'VOR RWY 02'], stars: ['TALCA 1A', 'PENCU 1B', 'CHILLAN 2C'], metar: 'SCIE 011600Z 36015KT 9999 BKN025 15/10 Q1011', taf: 'TAF SCIE 011612Z 0118/0218 35016G26KT 9999 BKN030 OVC070', notam: 'A0944/26 - ILS CAT III RWY 02 OPERANDO EN MODO PRUEBA DEBIDO A REEMPLAZO DE LOCALIZADOR.' },
            'SCQP': { nombre: 'La Araucanía', ciudad: 'Temuco', rwys: ['01', '19'], apps: ['ILS Z RWY 19', 'RNP RWY 19', 'RNP RWY 01', 'VOR DME RWY 19'], stars: ['TEMUCO 1A', 'GORBEA 1B'], metar: 'SCQP 011600Z 34008KT 9999 SCT020 BKN040 14/09 Q1012', taf: 'TAF SCQP 011600Z 0118/0218 02010KT 9999 BKN035 TN08/0209Z', notam: 'A0341/26 - AVSEC REFORZADO EN PERIMETRO DE PLATAFORMA COMERCIAL.' },
            'SCPQ': { nombre: 'Mocopulli', ciudad: 'Castro', rwys: ['17', '35'], apps: ['RNP RWY 17', 'RNP RWY 35', 'VISUAL RWY 17'], stars: ['CASTRO 1A', 'CHILOE 2D'], metar: 'SCPQ 011600Z 32014KT 9999 BKN018 12/08 Q1010', taf: 'TAF SCPQ 011500Z 0118/0206 31015KT 8000 -RA BKN020', notam: 'A0198/26 - AD EXCLUSIVO PARA OPERACION DIURNA, NO SE REGISTRA RELLENO DE COMBUSTIBLE JET-A1.' },
            'SCVD': { nombre: 'Pichoy', ciudad: 'Valdivia', rwys: ['17', '35'], apps: ['RNP RWY 17', 'VOR DME RWY 17', 'VISUAL RWY 35'], stars: ['VALDIVIA 1A', 'PRINGLES 1B'], metar: 'SCVD 011600Z 29010KT 9999 SCT022 13/09 Q1011', taf: 'TAF SCVD 011200Z 0112/0212 30012KT 9999 SCT030', notam: 'A0556/26 - TRÁFICO EXCLUSIVO DE AVES EN SECTOR DE APROXIMACIÓN FINAL RWY 17.' },
            'SCTE': { nombre: 'El Tepual', ciudad: 'Puerto Montt', rwys: ['17', '35'], apps: ['ILS Z RWY 17', 'RNP RWY 17', 'RNP RWY 35', 'VOR DME RWY 17'], stars: ['KIRAM 1A', 'ALCON 1B', 'TEPU 1A'], metar: 'SCTE 011600Z 28012KT 9999 BKN025 OVC040 11/08 Q1009 NOSIG', taf: 'TAF SCTE 011200Z 0112/0212 29015KT 9999 BKN030 OVC060 TN06/0208Z', notam: 'A1523/26 - PARVADAS DE TRILLES DETECTADAS EN LAS CERCANÍAS DE LAS CALLES DE RODAJE.' },

            'SCJO': { nombre: 'Canal Bajo', ciudad: 'Osorno', rwys: ['15', '33'], apps: ['RNP RWY 15', 'VOR DME RWY 15', 'VISUAL RWY 33'], stars: ['OSORNO 1A', 'PILMAIQUEN 2B'], metar: 'SCJO 011600Z 30008KT 9999 SCT025 13/09 Q1010', taf: 'TAF SCJO 011200Z 0112/0212 29010KT 9999 SCT035', notam: 'A0114/26 - RESTRICCIÓN DE ESPACIO DE GIRO EN CABECERA 15 POR DETERIORO DEL ASFALTO.' },
            'SCCI': { nombre: 'Carlos Ibáñez del Campo', ciudad: 'Punta Arenas', rwys: ['07', '25', '12', '30'], apps: ['ILS Z RWY 25', 'VOR DME RWY 07', 'RNP RWY 12', 'RNP RWY 30'], stars: ['DARAM 1A', 'NAS 1B', 'SENO 3C'], metar: 'SCCI 011600Z 29028G42KT 9999 BKN035 05/-01 Q1002', taf: 'TAF SCCI 011200Z 0112/0212 28030G45KT 9999 BKN040 TX07/0117Z TN-02/0207Z', notam: 'A2211/26 - CONTROL DE ESCARCHA EN RWY CENTRAL ACTIVADO POR BAJAS TEMPERATURAS.' }
        };

        // Estado interno en memoria
        const estadoOpcionesDeConsola = {};

        Object.keys(baseDatosAerodromos).forEach(icao => {
            const data = baseDatosAerodromos[icao];
            estadoOpcionesDeConsola[icao] = {
                rwyInUse: data.rwys[0],
                appInUse: data.apps[0],
                starInUse: data.stars[0],
                activo: (icao === 'SCEL' || icao === 'SCIE' || icao === 'SCQP')
            };
        });

        // PARSER DE METAR PARA CATEGORÍAS DE VUELO
        function determinarCategoriaVuelo(metar) {
            if (metar.includes('CAVOK')) return 'VMC';

            let visibilidad = 9999;
            let techoNubes = 999; // Cientos de pies

            // 1. Visibilidad (Busca grupo de 4 dígitos aislados, excluyendo la hora que termina en Z)
            const matchVisibilidad = metar.match(/\s(\d{4})\s/);
            if (matchVisibilidad) {
                visibilidad = parseInt(matchVisibilidad[1], 10);
            }

            // 2. Techo de Nubes (Buscamos capas Broken (BKN) o Overcast (OVC) y tomamos la más baja)
            const regexNubes = /(BKN|OVC)(\d{3})/g;
            let matchNubes;
            while ((matchNubes = regexNubes.exec(metar)) !== null) {
                const altura = parseInt(matchNubes[2], 10);
                if (altura < techoNubes) techoNubes = altura;
            }

            // Evaluar Categoría por Visibilidad
            let catVis = 'VMC';
            if (visibilidad < 1600) catVis = 'LIFR';
            else if (visibilidad < 5000) catVis = 'IFR';
            else if (visibilidad <= 8000) catVis = 'MVFR';

            // Evaluar Categoría por Techo
            let catTecho = 'VMC';
            if (techoNubes < 5) catTecho = 'LIFR';           // Menos de 500 ft
            else if (techoNubes < 10) catTecho = 'IFR';      // 500 a 999 ft
            else if (techoNubes <= 30) catTecho = 'MVFR';    // 1000 a 3000 ft

            // Retornar la condición más restrictiva (Prioridad: LIFR > IFR > MVFR > VMC)
            const prioridades = { 'LIFR': 4, 'IFR': 3, 'MVFR': 2, 'VMC': 1 };
            if (prioridades[catVis] >= prioridades[catTecho]) return catVis;
            return catTecho;
        }

        // CONTROL DE ACCESO
        function evaluarClaveIntro(event) {
            if (event.key === "Enter") validarAcceso();
        }

        function validarAcceso() {
            const passInput = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('error-msg');
            const selectedUnit = document.getElementById('login-unit').value;

            if (passInput === "atc2026") {
                errorMsg.style.display = 'none';
                document.getElementById('session-unit').innerText = `UNIDAD ACTUAL: ${selectedUnit}`;
                document.getElementById('login-overlay').style.opacity = '0';
                
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('app-layout').style.display = 'flex';
                    construirSidebar();
                    actualizarDashboard();
                }, 350);
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // CONSTRUCCIÓN E INTERACTIVIDAD DE LA INTERFAZ
        function construirSidebar() {
            const container = document.getElementById('sidebar-nodes');
            container.innerHTML = '';

            Object.keys(baseDatosAerodromos).forEach(icao => {
                const data = baseDatosAerodromos[icao];
                const state = estadoOpcionesDeConsola[icao];
                
                const item = document.createElement('div');
                item.className = `airport-item ${state.activo ? 'active' : ''}`;
                item.setAttribute('data-filter', `${icao} ${data.nombre} ${data.ciudad}`.toLowerCase());
                item.innerHTML = `
                    <span class="icao-code">${icao}</span>
                    <span class="ap-name">${data.nombre}<br><small style="color:var(--text-muted); font-size:0.75rem;">${data.ciudad}</small></span>
                `;
                item.onclick = () => {
                    state.activo = !state.activo;
                    construirSidebar();
                    actualizarDashboard();
                };
                container.appendChild(item);
            });
        }

        function filtrarSidebar() {
            const q = document.getElementById('sidebar-search').value.toLowerCase();
            document.querySelectorAll('.airport-item').forEach(item => {
                const text = item.getAttribute('data-filter');
                item.style.display = text.includes(q) ? 'flex' : 'none';
            });
        }

        function registrarCambioLocal(icao, tipoParametro, valor) {
            estadoOpcionesDeConsola[icao][tipoParametro] = valor;
        }

        function actualizarDashboard() {
            const grid = document.getElementById('dashboard-cards-container');
            grid.innerHTML = '';

            const aerodromosActivos = Object.keys(baseDatosAerodromos).filter(icao => estadoOpcionesDeConsola[icao].activo);

            if (aerodromosActivos.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; color: var(--text-muted); text-align: center; margin-top: 50px; font-size: 0.95rem;">No hay aeródromos seleccionados. Active estaciones desde la lista lateral.</p>`;
                return;
            }

            aerodromosActivos.forEach(icao => {
                const data = baseDatosAerodromos[icao];
                const state = estadoOpcionesDeConsola[icao];
                
                // Calcular la categoría VFR/IFR basándose en el string del METAR
                const categoriaVuelo = determinarCategoriaVuelo(data.metar);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="header-title-container">
                            <h3>${icao} - ${data.nombre.toUpperCase()}</h3>
                            <span class="flight-category cat-${categoriaVuelo}">${categoriaVuelo}</span>
                        </div>
                        <span class="city-label">${data.ciudad}</span>
                    </div>
                    <div class="card-body">
                        <div class="selectors-layout">
                            <div class="selector-box">
                                <label>Pista en Uso</label>
                                <select onchange="registrarCambioLocal('${icao}', 'rwyInUse', this.value)">
                                    ${data.rwys.map(r => `<option value="${r}" ${r === state.rwyInUse ? 'selected' : ''}>RWY ${r}</option>`).join('')}
                                </select>
                            </div>
                            <div class="selector-box">
                                <label>Aproximación en Uso</label>
                                <select onchange="registrarCambioLocal('${icao}', 'appInUse', this.value)">
                                    ${data.apps.map(a => `<option value="${a}" ${a === state.appInUse ? 'selected' : ''}>${a}</option>`).join('')}
                                </select>
                            </div>
                            <div class="selector-box">
                                <label>STAR en Uso</label>
                                <select onchange="registrarCambioLocal('${icao}', 'starInUse', this.value)">
                                    ${data.stars.map(s => `<option value="${s}" ${s === state.starInUse ? 'selected' : ''}>${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="ifis-block">
                            <span class="block-title">IFIS - METAR</span>
                            ${data.metar}
                        </div>
                        <div class="ifis-block TAF-block">
                            <span class="block-title">IFIS - TAF</span>
                            ${data.taf}
                        </div>
                        <div class="ifis-block notam-block">
                            <span class="block-title">IFIS - NOTAM ACTIVOS</span>
                            ${data.notam}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // RELOJ DIGITAL ZULU (UTC)
        function refrescarReloj() {
            const f = new Date();
            const h = f.getUTCHours().toString().padStart(2, '0');
            const m = f.getUTCMinutes().toString().padStart(2, '0');
            const s = f.getUTCSeconds().toString().padStart(2, '0');
            document.getElementById('zulu-timer').innerText = `${h}:${m}:${s} Z`;
        }
        setInterval(refrescarReloj, 1000);
        refrescarReloj();
    </script>
</body>
</html>
